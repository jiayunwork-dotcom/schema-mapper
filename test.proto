syntax = "proto3";

package com.example.user;

message User {
  int32 id = 1;
  string user_name = 2;
  string email = 3;
  int32 age = 4;
  string create_time = 5;
  repeated string tags = 6;
  string status = 7;
  Address address = 8;

  enum Status {
    ACTIVE = 0;
    INACTIVE = 1;
    PENDING = 2;
  }
}

message Address {
  string street = 1;
  string city = 2;
  string zip_code = 3;
}
